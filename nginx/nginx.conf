# ================================================================
# nginx/nginx.conf
# Reverse proxy: serves static frontend + proxies /api/* to backend
# ================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────
    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    gzip           on;
    gzip_types     text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header X-Content-Type-Options   "nosniff"    always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Rate Limiting ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=static:10m rate=60r/m;

    # ── Upstream ──────────────────────────────────────────────────
    upstream backend_api {
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP Server ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Static Frontend ───────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            limit_req zone=static burst=20 nodelay;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Backend API Proxy ─────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
            client_max_body_size   100m;    # allow large document uploads
        }

        # ── Health check proxy ────────────────────────────────────
        location /health {
            proxy_pass http://backend_api/health;
            access_log off;
        }

        location /docs {
            proxy_pass http://backend_api/docs;
        }

        # ── Block sensitive paths ─────────────────────────────────
        location ~ /\.env {
            deny all;
            return 404;
        }
        location ~ /\.git {
            deny all;
            return 404;
        }
    }

    # ── HTTPS Server (uncomment after adding SSL certs) ───────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... same locations as HTTP server above ...
    # }
}
